[package]
name = "apollo_versioned_constants"
version.workspace = true
edition.workspace = true
repository.workspace = true
license-file.workspace = true
description = "Versioned constants for the Apollo consensus orchestrator"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
starknet_api.workspace = true
thiserror.workspace = true

[dev-dependencies]
starknet_api = { workspace = true, features = ["testing"] }

[lints]
workspace = true

[package.metadata.cargo-machete]
# `serde_json` is referenced by `starknet_api::define_versioned_constants!` expansions, not directly in
# this crate's source, so cargo-machete may falsely detect it as unused.
ignored = ["serde_json"]
