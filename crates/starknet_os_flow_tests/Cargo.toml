[package]
name = "starknet_os_flow_tests"
version.workspace = true
edition.workspace = true
repository.workspace = true
license-file.workspace = true
description = "Integration tests for Starknet OS execution and state commitment flow."

[features]
exhaustive_fuzz_test = []
fuzz_test_debug = []
long_fuzz_test = []
os_input = ["apollo_integration_tests/os_input", "blockifier/os_input"]

[dev-dependencies]
apollo_integration_tests.workspace = true
assert_matches.workspace = true
blockifier = { workspace = true, features = ["reexecution", "testing"] }
blockifier_test_utils.workspace = true
cairo-lang-runner.workspace = true
cairo-lang-starknet-classes.workspace = true
cairo-vm.workspace = true
chrono.workspace = true
expect-test.workspace = true
indexmap.workspace = true
itertools.workspace = true
rand.workspace = true
rand_chacha.workspace = true
rstest.workspace = true
serde_json.workspace = true
shared_execution_objects.workspace = true
starknet-core.workspace = true
starknet-crypto.workspace = true
starknet-types-core.workspace = true
starknet_api.workspace = true
starknet_committer = { workspace = true, features = ["testing"] }
starknet_os = { workspace = true, features = ["include_program_output", "testing"] }
starknet_patricia = { workspace = true, features = ["testing"] }
starknet_patricia_storage = { workspace = true, features = ["testing"] }
starknet_proof_verifier.workspace = true
starknet_transaction_prover = { workspace = true, features = ["os_input"] }
strum.workspace = true
tokio.workspace = true

[lints]
workspace = true
