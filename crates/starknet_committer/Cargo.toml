[package]
name = "starknet_committer"
version.workspace = true
edition.workspace = true
repository.workspace = true
license.workspace = true
description = "Computes and manages Starknet state."

[features]
os_input = ["dep:bincode", "dep:blake2", "dep:digest", "dep:zstd"]
testing = ["starknet_patricia/testing"]

[dependencies]
apollo_config.workspace = true
async-trait.workspace = true
bincode = { workspace = true, optional = true }
blake2 = { workspace = true, optional = true }
blockifier.workspace = true
derive_more = { workspace = true, features = ["as_ref", "from", "into"] }
digest = { workspace = true, optional = true }
ethnum.workspace = true
pretty_assertions.workspace = true
rand.workspace = true
rand_distr.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
starknet-rust-core.workspace = true
starknet-types-core = { workspace = true, features = ["hash", "papyrus-serialization"] }
starknet_api.workspace = true
starknet_patricia.workspace = true
starknet_patricia_storage.workspace = true
strum.workspace = true
thiserror.workspace = true
tokio = { workspace = true, features = ["macros", "rt"] }
tracing.workspace = true
zstd = { workspace = true, optional = true }

[dev-dependencies]
async-recursion.workspace = true
expect-test.workspace = true
hex.workspace = true
rstest.workspace = true
rstest_reuse.workspace = true
starknet_api = { workspace = true, features = ["testing"] }
starknet_patricia = { workspace = true, features = ["testing"] }

[lints]
workspace = true
