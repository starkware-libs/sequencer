[analytics]
reporting_enabled = false
check_for_updates = false

[security]
admin_user = admin
admin_password = admin
allow_sign_up = false
disable_gravatar = true
disable_initial_admin_creation = true
cookie_secure = false
cookie_samesite = lax

[auth.anonymous]
enabled = true
org_name = Main Org.
org_role = Admin
hide_version = true

[dashboards]
default_home_dashboard_path = ""

[database]
type = sqlite3
path = grafana.db

[session]
provider = memory

[users]
default_theme = dark
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Admin

[unified_alerting]
enabled = false

[alerting]
enabled = false

[auth]
disable_login_form = true
disable_signout_menu = true

[server]
serve_from_sub_path = false
http_port = 3000
protocol = http

[log]
mode = console
level = info
