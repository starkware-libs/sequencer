[package]
name = "starknet_patricia"
version.workspace = true
edition.workspace = true
repository.workspace = true
license-file.workspace = true
description = "Library for computing and updating Patricia trees."

[features]
deserialize = []
testing = ["dep:num-bigint"]

[dependencies]
async-recursion.workspace = true
derive_more = { workspace = true, features = ["add", "display"] }
ethnum.workspace = true
num-bigint = { workspace = true, optional = true }
rand.workspace = true
serde = { workspace = true, features = ["derive"] }
serde_json.workspace = true
starknet-rust-core.workspace = true
starknet-types-core.workspace = true
starknet_api.workspace = true
starknet_patricia_storage.workspace = true
strum = { workspace = true, features = ["derive"] }
thiserror.workspace = true
tokio = { workspace = true, features = ["macros", "rt", "rt-multi-thread"] }

[dev-dependencies]
num-bigint = { workspace = true, features = ["rand"] }
pretty_assertions.workspace = true
rand.workspace = true
rstest.workspace = true

[lints]
workspace = true
