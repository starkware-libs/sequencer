global:
  scrape_interval: 5s
scrape_configs:
 - job_name: prometheus
   static_configs:
    - targets:
       - prometheus:9090
 - job_name: node
   metrics_path: /monitoring/metrics
   static_configs:
    - targets:
       - sequencer-node-0:8082
       - sequencer-node-1:8082
       - sequencer-node-2:8082
       - sequencer-node-3:8082
       - sequencer-node-4:8082
