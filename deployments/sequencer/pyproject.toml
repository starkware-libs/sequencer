[tool.poetry]
name = "sequencer-cdk8s"
version = "0.1.0"
description = "CDK8s deployment configuration for the Sequencer"
readme = "README.md"
package-mode = false

[tool.poetry.dependencies]
python = "^3.10"
cdk8s = "~2.66.2"
constructs = "~10.2.70"
jsonschema = "~4.23.0"
exceptiongroup = "~1.2.2"
types-jsonschema = "*"
mypy = "*"
# Code style versions aligned with scripts/py_code_style.py (scripts/requirements.txt)
autoflake = "2.3.1"
black = "23.1a1"
isort = "6.1.0"
pydantic = "*"
pyyaml = "*"
types-pyyaml = "*"
rich = "*"

[tool.poetry.group.dev.dependencies]
# Dev deps are in main dependencies above (autoflake, black, isort, mypy)

[tool.black]
line-length = 100
target-version = ["py37"]

[tool.isort]
profile = "black"
line_length = 100

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
