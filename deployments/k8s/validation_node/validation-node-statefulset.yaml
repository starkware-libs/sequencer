apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: validation-node
  labels:
    app.kubernetes.io/name: validation-node
spec:
  serviceName: validation-node
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: validation-node
  template:
    metadata:
      labels:
        app.kubernetes.io/name: validation-node
    spec:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
        - name: wait-for-signature-manager
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for signature-manager:9090...";
              until nc -z signature-manager 9090; do
                sleep 2;
              done
              echo "signature-manager is reachable."
      containers:
        - name: apollo-node
          image: ghcr.io/starkware-libs/sequencer/sequencer:apollo-0.14.2-rc.7-fix
          args:
            - "--config_file"
            - "/config/validation_node.json"
          env:
            - name: RUST_LOG
              value: "info"
            - name: RUST_BACKTRACE
              value: "1"
          ports:
            - name: monitoring
              containerPort: 8082
              protocol: TCP
            - name: consensus-p2p
              containerPort: 53080
              protocol: TCP
            - name: state-sync-p2p
              containerPort: 53140
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config/validation_node.json
              subPath: validation_node.json
              readOnly: true
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /monitoring/alive
              port: monitoring
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /monitoring/alive
              port: monitoring
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 6
      volumes:
        - name: config
          configMap:
            name: apollo-validation-node-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 200Gi
