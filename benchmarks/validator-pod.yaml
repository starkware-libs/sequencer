# Storage Validation Pod
#
# Mounts snapshot copies of the batch100 and baseline PVCs, then runs
# the validate_storage binary to compare them byte-by-byte.
#
# Usage:
#   kubectl apply -f validator-pod.yaml
#   kubectl wait --for=condition=Ready pod/storage-validator -n dean-batching-test --timeout=120s
#   kubectl cp target/release/validate_storage dean-batching-test/storage-validator:/tmp/validate_storage
#   kubectl exec -n dean-batching-test storage-validator -- chmod +x /tmp/validate_storage
#   kubectl exec -n dean-batching-test storage-validator -- /tmp/validate_storage \
#     --db1-path /data/batch100/state_sync/SN_MAIN \
#     --db2-path /data/baseline/state_sync/SN_MAIN
#
# Cleanup:
#   kubectl delete pod storage-validator -n dean-batching-test

apiVersion: v1
kind: Pod
metadata:
  name: storage-validator
  namespace: dean-batching-test
  labels:
    app: storage-validator
spec:
  restartPolicy: Never
  securityContext:
    runAsUser: 0
    runAsGroup: 0
    fsGroup: 0
  containers:
  - name: validator
    image: ubuntu:24.04
    command: ["sleep", "infinity"]
    resources:
      requests:
        cpu: "2"
        memory: 8Gi
      limits:
        cpu: "4"
        memory: 16Gi
    volumeMounts:
    - name: batch100-data
      mountPath: /data/batch100
    - name: baseline-data
      mountPath: /data/baseline
  volumes:
  - name: batch100-data
    persistentVolumeClaim:
      claimName: validation-batch100-data
  - name: baseline-data
    persistentVolumeClaim:
      claimName: validation-baseline-data
