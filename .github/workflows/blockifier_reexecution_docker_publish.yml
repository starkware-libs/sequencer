name: Blockifier-Reexecution-Docker-Publish

on:
  workflow_dispatch:
  push:
    paths:
      - "crates/blockifier_reexecution/**"
      - "crates/blockifier/**"
      - ".github/workflows/blockifier_reexecution_docker_publish.yml"

permissions:
  contents: read
  id-token: write

env:
  IMAGE: us-central1-docker.pkg.dev/starkware-dev/sequencer/blockifier-reexecution

jobs:
  docker-build-push:
    runs-on: namespace-profile-small-ubuntu-24-04-amd64
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: crates/blockifier_reexecution/replay/Dockerfile
          push: true
          tags: ${{ env.IMAGE }}:latest
