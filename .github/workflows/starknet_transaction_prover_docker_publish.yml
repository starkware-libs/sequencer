name: Starknet-Transaction-Prover-Docker-Publish

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize
  push:
    tags:
      - "v*.*.*"
      - "APOLLO-*"
      - "PRIVACY-*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/starkware-libs/starknet-privacy/transaction-prover

jobs:
  docker-build-push:
    runs-on: namespace-profile-medium-ubuntu-24-04-amd64
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ghcr.io
        uses: docker/login-action@v2.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true

      - name: Build Docker image
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          ./scripts/build_starknet_transaction_prover.sh \
            --image-tag "$IMAGE_NAME:$TAG-amd64" \
            --target-cpu "znver5"

      - name: Push Docker image
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: docker push "$IMAGE_NAME:$TAG-amd64"

  docker-build-push-arm64:
    runs-on: namespace-profile-medium-ubuntu-24-04-arm64
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set image tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ghcr.io
        uses: docker/login-action@v2.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true

      - name: Build Docker image
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          ./scripts/build_starknet_transaction_prover.sh \
            --image-tag "$IMAGE_NAME:$TAG-arm64" \
            --target-cpu "neoverse-v2"

      - name: Push Docker image
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: docker push "$IMAGE_NAME:$TAG-arm64"

  merge-manifest:
    runs-on: namespace-profile-medium-ubuntu-24-04-amd64
    needs: [docker-build-push, docker-build-push-arm64]
    timeout-minutes: 10
    steps:
      - name: Set image tag
        id: tag
        env:
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "value=pr-${SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to ghcr.io
        uses: docker/login-action@v2.1.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          logout: true

      - name: Create multi-arch manifest
        env:
          TAG: ${{ steps.tag.outputs.value }}
        run: |
          docker buildx imagetools create \
            -t "$IMAGE_NAME:$TAG" \
            "$IMAGE_NAME:$TAG-amd64" \
            "$IMAGE_NAME:$TAG-arm64"
