name: Main-CI-Nightly
on:
  schedule:
    - cron: "0 0 * * *" # Runs at 00:00 UTC every day
  workflow_dispatch:

env:
  RUSTFLAGS: "-D warnings"

jobs:
  define_branches:
    runs-on: namespace-profile-small-ubuntu-24-04-amd64
    outputs:
      branches: ${{ steps.branches.outputs.branches }}
    steps:
      - name: Define branches for nightly run.
        id: branches
        run: echo 'branches=["main", "main-v0.14.3", "main-v0.14.2"]' >> "$GITHUB_OUTPUT"

  feature_combos:
    runs-on: namespace-profile-large-ubuntu-24-04-amd64;ephemeral-storage.size-multiplier=2
    needs: define_branches
    strategy:
      matrix:
        branch: ${{ fromJson(needs.define_branches.outputs.branches) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      # Setup pypy and link to the location expected by .cargo/config.toml.
      - uses: actions/setup-python@v5
        id: setup-pypy
        with:
          python-version: "pypy3.9"
          cache: "pip"
      - run: ln -s '${{ steps.setup-pypy.outputs.python-path }}' /usr/local/bin/pypy3.9
      - env:
          LD_LIBRARY_PATH: ${{ env.Python3_ROOT_DIR }}/bin
        run: echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}" >> $GITHUB_ENV
      - run: pip install -r scripts/requirements.txt

      # Install rust components.
      - uses: ./.github/actions/bootstrap
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Run feature combo test.
      - name: "Run feature combo on all crates."
        run: scripts/run_feature_combos_test.py

  run-integration-tests:
    runs-on: namespace-profile-large-ubuntu-24-04-amd64;ephemeral-storage.size-multiplier=1.5
    needs: define_branches
    strategy:
      matrix:
        branch: ${{ fromJson(needs.define_branches.outputs.branches) }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ matrix.branch }}

      - uses: ./.github/actions/bootstrap
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      # Setup pypy and link to the location expected by .cargo/config.toml.
      - uses: actions/setup-python@v5
        id: setup-pypy
        with:
          python-version: "pypy3.9"
      - run: ln -s '${{ steps.setup-pypy.outputs.python-path }}' /usr/local/bin/pypy3.9
      - env:
          LD_LIBRARY_PATH: ${{ env.Python3_ROOT_DIR }}/bin
        run: echo "LD_LIBRARY_PATH=${LD_LIBRARY_PATH}" >> $GITHUB_ENV
      - run: pip install -r scripts/requirements.txt
      # Integration tests assign node listener ports from a static range starting at BASE_PORT
      # (11000), see crates/apollo_infra_utils/src/test_utils.rs. The kernel's default ephemeral
      # range overlaps it, so an outbound connection can transiently claim a port that a node later
      # tries to bind as a listener, causing EADDRINUSE and a node startup failure (flaky
      # "should be alive" timeouts). Move the ephemeral range entirely below BASE_PORT so the two
      # ranges can never overlap.
      - name: "Move ephemeral port range below the integration-test static port range"
        run: sudo sysctl -w net.ipv4.ip_local_port_range="2000 10999"
      - name: "Run integration tests pull request"
        run: |
          scripts/run_tests.py --command integration --is_nightly
        env:
          SEED: 0
