name: Starknet-OS-Runner-Prover-CI

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - edited
    paths:
      - ".github/workflows/starknet_os_runner_ci.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/blockifier/**"
      - "crates/blockifier_reexecution/**"
      - "crates/starknet_os_runner/**"
      - "crates/starknet_os/**"
      - "crates/starknet_committer/**"
      - "crates/starknet_patricia/**"
      - "crates/proving_utils/**"
      - "scripts/dependencies.sh"
      - "scripts/install_build_tools.sh"
      - "scripts/install_stwo_run_and_prove.sh"
      - "scripts/proving_utils_env.sh"
      - "scripts/sequencer-ci.Dockerfile"

env:
  RUSTFLAGS: "-D warnings"

concurrency:
  group: >
    ${{ github.workflow }}-
    ${{ github.ref }}-
    ${{ github.event_name == 'pull_request' && 'PR' || github.sha }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  starknet_os_runner_prover:
    runs-on: namespace-profile-large-ubuntu-24-04-amd64
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/bootstrap
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache prover build
        uses: namespacelabs/nscloud-cache-action@v1
        with:
          path: |
            build/proving-utils
            target/tools

      - name: Install stwo_run_and_prove
        run: SKIP_BUILD_IF_EXISTS=1 ./scripts/install_stwo_run_and_prove.sh

      - id: auth
        uses: "google-github-actions/auth@v2"
        with:
          credentials_json: ${{ secrets.SA_STARKNET_OS_RUNNER_ARTIFACTS }}
      - uses: "google-github-actions/setup-gcloud@v2"
      - run: echo "OS_RUNNER_FILES_PREFIX=$(cat ./crates/starknet_os_runner/resources/offline_files_prefix)" >> $GITHUB_ENV
      - run: mkdir -p ./crates/starknet_os_runner/resources/rpc_records
      - run: gcloud storage cp -r gs://starknet-os-runner-artifacts/$OS_RUNNER_FILES_PREFIX/rpc_records/* ./crates/starknet_os_runner/resources/rpc_records/

      - name: "Test: prove balance_of transaction"
        run: cargo test --release -p starknet_os_runner test_prove_balance_of_transaction -- --ignored
      - name: "Test: prove transfer transaction"
        run: cargo test --release -p starknet_os_runner test_prove_transfer_transaction -- --ignored
